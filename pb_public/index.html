<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HuishoudHub</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar" aria-label="Navigatie">
      <div class="brand">Huishoud<br>Hub</div>
      <nav class="nav">
        <button class="active" type="button" data-view-button="today">Vandaag</button>
        <button type="button" data-view-button="week">Deze week</button>
        <button type="button" data-view-button="list">Lijst</button>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="fullscreen-toggle" type="button" aria-label="Volledig scherm" title="Volledig scherm" data-fullscreen-toggle>⛶</button>
        <div class="top-title">
          <h1>Vandaag</h1>
          <div class="date"></div>
        </div>
        <div class="top-actions">
          <button class="theme-toggle" type="button" aria-label="Donker thema" data-theme-toggle>☾</button>
          <button class="my-person-toggle" type="button" aria-label="Wissel persoon" id="showPersonPicker">
            <span class="avatar" id="myPersonAvatar">?</span>
          </button>
          <button class="add-button" type="button" aria-label="Nieuwe taak" data-open-form>+ <span>Nieuwe taak</span></button>
        </div>
      </header>

      <div class="loading-indicator" id="loadingIndicator">Taken laden…</div>

      <section class="summary" aria-label="Samenvatting">
        <button class="metric danger" type="button" data-filter="overdue">
          <strong id="overdueCount">0</strong>
          <span>te laat</span>
        </button>
        <button class="metric now" type="button" data-filter="now">
          <strong id="nowCount">0</strong>
          <span>nu</span>
        </button>
        <button class="metric select-all" type="button" data-filter="today">
          <strong id="todayCount">0</strong>
          <span>alles</span>
        </button>
      </section>

      <section class="filters" aria-label="Filters">
        <button class="filter" type="button" data-person-filter="EV"><span class="avatar ev">EV</span> Emmy</button>
        <button class="filter" type="button" data-person-filter="JV"><span class="avatar jv">JV</span> Joris</button>
        <button class="filter" type="button" data-person-filter="JD"><span class="avatar jd">JD</span> Juliette</button>
        <button class="filter" type="button" data-person-filter="MV"><span class="avatar mv">MV</span> Mark</button>
        <button class="filter select-all active" type="button" data-person-filter="all">Iedereen</button>
      </section>

      <section class="board view active" id="todayView" aria-live="polite">
        <div class="column">
          <div class="section-title"><b>Te laat</b><span id="overdueLabel"></span></div>
          <div class="tasks" id="overdueTasks"></div>

          <div class="section-title"><b>Nu</b><span id="nowLabel"></span></div>
          <div class="tasks" id="nowTasks"></div>

          <div class="section-title"><b>Vandaag</b><span id="todayLabel"></span></div>
          <div class="tasks" id="todayTasks"></div>
        </div>

        <div class="column">
          <div class="section-title"><b>Gedaan</b><span id="doneLabel"></span></div>
          <div class="tasks" id="doneTasks"></div>

          <section class="person-strip" aria-label="Open taken per persoon" id="peopleSummary"></section>
        </div>
      </section>

      <section class="compact-board view" id="weekView" aria-live="polite">
        <div class="compact-group">
          <div class="section-title"><b data-day-title="maandag">Maandag</b><span id="weekMondayLabel"></span></div>
          <div class="compact-list" id="weekMondayTasks"></div>
        </div>
        <div class="compact-group">
          <div class="section-title"><b data-day-title="dinsdag">Dinsdag</b><span id="weekTuesdayLabel"></span></div>
          <div class="compact-list" id="weekTuesdayTasks"></div>
        </div>
        <div class="compact-group">
          <div class="section-title"><b data-day-title="woensdag">Woensdag</b><span id="weekWednesdayLabel"></span></div>
          <div class="compact-list" id="weekWednesdayTasks"></div>
        </div>
        <div class="compact-group">
          <div class="section-title"><b data-day-title="donderdag">Donderdag</b><span id="weekThursdayLabel"></span></div>
          <div class="compact-list" id="weekThursdayTasks"></div>
        </div>
        <div class="compact-group">
          <div class="section-title"><b data-day-title="vrijdag">Vrijdag</b><span id="weekFridayLabel"></span></div>
          <div class="compact-list" id="weekFridayTasks"></div>
        </div>
        <div class="compact-group">
          <div class="section-title"><b data-day-title="zaterdag">Zaterdag</b><span id="weekSaturdayLabel"></span></div>
          <div class="compact-list" id="weekSaturdayTasks"></div>
        </div>
        <div class="compact-group">
          <div class="section-title"><b data-day-title="zondag">Zondag</b><span id="weekSundayLabel"></span></div>
          <div class="compact-list" id="weekSundayTasks"></div>
        </div>
        <div class="compact-group">
          <div class="section-title"><b>Afgerond deze week</b><span id="weekDoneLabel"></span></div>
          <div class="compact-list" id="weekDoneTasks"></div>
        </div>
      </section>

      <section class="compact-board view" id="listView" aria-live="polite">
        <div class="list-search">
          <label for="listTextFilter">Zoeken in lijst</label>
          <div class="list-search-row">
            <input id="listTextFilter" type="search" placeholder="Bijvoorbeeld: douchen, Juliette, zaterdag">
            <button class="primary-button" type="button" data-list-filter-apply>Filter toepassen</button>
            <button class="secondary-button" type="button" data-list-filter-clear>Wissen</button>
          </div>
        </div>
        <div class="compact-group">
          <div class="section-title"><b>Openstaand</b><span id="listOpenLabel"></span></div>
          <div class="compact-list" id="listOpenTasks"></div>
        </div>
        <div class="compact-group">
          <div class="section-title"><b>Toekomstig</b><span id="listFutureLabel"></span></div>
          <div class="compact-list" id="listFutureTasks"></div>
        </div>
        <div class="compact-group">
          <div class="section-title"><b>Afgerond</b><span id="listDoneLabel"></span></div>
          <div class="compact-list" id="listDoneTasks"></div>
        </div>
        <div id="listSentinel" style="height:1px"></div>
      </section>

      <section class="view" id="formView" aria-live="polite">
        <form class="task-form" id="taskForm">
          <div class="form-grid">
            <div class="field full">
              <label for="taskTitle">Taak</label>
              <input id="taskTitle" name="title" type="text" placeholder="Bijvoorbeeld: keuken dweilen" required>
            </div>

            <div class="field full">
              <label>Wie</label>
              <div class="choice-row" id="personChoices">
                <label><input type="checkbox" name="persons" value="EV" checked><span class="person-choice"><span class="avatar ev">EV</span> Emmy</span></label>
                <label><input type="checkbox" name="persons" value="JV"><span class="person-choice"><span class="avatar jv">JV</span> Joris</span></label>
                <label><input type="checkbox" name="persons" value="JD"><span class="person-choice"><span class="avatar jd">JD</span> Juliette</span></label>
                <label><input type="checkbox" name="persons" value="MV"><span class="person-choice"><span class="avatar mv">MV</span> Mark</span></label>
              </div>
            </div>

            <div class="field">
              <label for="taskDate">Datum</label>
              <input id="taskDate" name="date" type="date" required>
            </div>

            <div class="field">
              <label>Tijd (optioneel)</label>
              <div class="choice-row">
                <label><input type="radio" name="time" value="" checked><span class="time-choice">Geen</span></label>
                <label><input type="radio" name="time" value="ochtend"><span class="time-choice">Ochtend</span></label>
                <label><input type="radio" name="time" value="middag"><span class="time-choice">Middag</span></label>
                <label><input type="radio" name="time" value="avond"><span class="time-choice">Avond</span></label>
              </div>
            </div>

            <div class="field">
              <label for="taskClock">Exacte tijd (optioneel)</label>
              <input id="taskClock" name="clock" type="time">
            </div>

            <div class="field full">
              <label for="taskNote">Opmerking</label>
              <input id="taskNote" name="note" type="text" placeholder="Bijvoorbeeld: voor school, uit school, na zwemles">
            </div>

            <div class="field full">
              <label>Herhaling</label>
              <div class="repeat-row">
                <label><input type="radio" name="repeat" value="ad-hoc" checked><span class="repeat-choice">Eenmalig</span></label>
                <label><input type="radio" name="repeat" value="dagelijks"><span class="repeat-choice">Dagelijks</span></label>
                <label><input type="radio" name="repeat" value="om de 2 dagen"><span class="repeat-choice" title="Iedere 2e dag vanaf startdatum">Om de dag</span></label>
                <label><input type="radio" name="repeat" value="schooldagen"><span class="repeat-choice">Schooldagen</span></label>
                <label><input type="radio" name="repeat" value="wekelijks"><span class="repeat-choice">Wekelijks</span></label>
                <label><input type="radio" name="repeat" value="maandelijks"><span class="repeat-choice">Maandelijks</span></label>
              </div>
            </div>

            <div class="field full">
              <label>Subtaken</label>
              <div class="subtask-editor" id="subtaskEditor"></div>
              <button class="secondary-button" type="button" data-add-subtask>+ Subtaak</button>
            </div>
          </div>

          <div class="field full" id="scopeField" style="display:none">
            <label>Wijziging toepassen op</label>
            <div class="choice-row">
              <label><input type="radio" name="scope" value="instance" checked><span class="repeat-choice">Alleen deze taak</span></label>
              <label><input type="radio" name="scope" value="future"><span class="repeat-choice">Deze en toekomstige</span></label>
            </div>
          </div>

          <div class="form-actions">
            <button class="secondary-button" type="button" data-cancel-form>Annuleren</button>
            <button class="danger-button" type="button" id="deleteTaskButton" style="display:none">Verwijderen</button>
            <button class="primary-button" type="submit" id="formSubmitButton">Taak toevoegen</button>
          </div>
        </form>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="Mobiele navigatie">
      <button class="active" type="button" data-view-button="today">Vandaag</button>
      <button type="button" data-view-button="week">Deze week</button>
      <button type="button" data-view-button="list">Lijst</button>
    </nav>
  </div>

  <!-- Taakdetail overlay -->
  <div class="task-detail-overlay" id="taskDetailOverlay" aria-modal="true" role="dialog">
    <div class="task-detail" id="taskDetailSheet">
      <button class="task-detail-close" type="button" id="taskDetailClose" aria-label="Sluiten">×</button>
      <div id="taskDetailContent"></div>
    </div>
  </div>

  <!-- App-bevestiging: vervangt native browser confirm(), zodat meldingen in de webapp blijven. -->
  <div class="confirm-overlay" id="confirmOverlay" aria-modal="true" role="dialog" aria-labelledby="confirmTitle">
    <div class="confirm-dialog">
      <button class="confirm-close" type="button" id="confirmCloseButton" aria-label="Sluiten">×</button>
      <div class="confirm-title" id="confirmTitle"></div>
      <div class="confirm-message" id="confirmMessage"></div>
      <ul class="confirm-list" id="confirmList"></ul>
      <div class="confirm-actions">
        <button class="secondary-button" type="button" id="confirmCancelButton">Annuleren</button>
        <button class="primary-button" type="button" id="confirmPrimaryButton">OK</button>
      </div>
    </div>
  </div>

  <!-- Persoon-picker: getoond bij eerste gebruik of bij wisselen -->
  <div class="person-picker-overlay" id="personPickerOverlay" style="display: none;">
    <div class="person-picker">
      <h2>Wie ben jij?</h2>
      <div class="person-picker-grid">
        <button type="button" class="person-picker-btn" data-pick-person="EV">
          <span class="avatar ev">EV</span>
          <span>Emmy</span>
        </button>
        <button type="button" class="person-picker-btn" data-pick-person="JV">
          <span class="avatar jv">JV</span>
          <span>Joris</span>
        </button>
        <button type="button" class="person-picker-btn" data-pick-person="JD">
          <span class="avatar jd">JD</span>
          <span>Juliette</span>
        </button>
        <button type="button" class="person-picker-btn" data-pick-person="MV">
          <span class="avatar mv">MV</span>
          <span>Mark</span>
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js?v=20260512b"></script>
</body>
</html>
